version: api/v1
kind: BPConfigmap
metadata:
  name: jpmc-salary-dev
spec:
  is_deploy: True
  manifest_meta_data:
    strategy: GIT_MANIFEST
    manifest_file_paths:
      - "configmap/jpmc-salary-dev.yaml"
    manifest_git_repo: ot-micro-salary
    manifest_git_repo_branch: helm-chart
  application_env_namespace:
    application_env:
      application: jpmc-ms
      environment_master: dev
      name: dev
    namespace:
      cluster: ot-aws-cluster
      name: dev
