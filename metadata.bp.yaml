kind: BPMetadata
metadata:
  name: metadata_config
spec:
  namespace: dev
  applications:
    - name: jpmc-ms
      ephemeral_source_env:
        name: "dev"
      services:
        - name: jpmc-login
          type: service
          config:
            service_env:
              image: dev/dev/jpmc-login
            build:
              branch_name: main
            deploy:
              replicas: 2
        - name: jpmc-python-app
          type: service
          config:
            service_env:
              image: dev/dev/jpmc-python-app        
            build:
              branch_name: main
            deploy:
              replicas: 3
        - name: jpmc-python-app
          type: service
          config:
            service_env:
              image: dev/dev/jpmc-python-app        
            build:
              branch_name: main
            deploy:
              replicas: 3
        - name: jpmc-salary
          type: service
          config:
            service_env:
              image: dev/dev/jpmc-salary        
            build:
              branch_name: main
            deploy:
              replicas: 3
    - name: web-logic
      ephemeral_source_env:
        name: "pre-prod"
      services:
        - name: frontend
          type: service
          config:
            service_env:
              image: dev/dev/frontend          
            build:
              branch_name:  master-frontend
            deploy:
              replicas: 2
        - name: payment-ui
          type: service
          config:
            service_env:
              image: dev/dev/payment-ui    
            build:
              branch_name: master-payment-ui
            deploy:
              replicas: 3
        - name: redis-v2
          type: middleware_service
          config:
            service_env:
              image: dev/dev/redis-v2
            deploy:
              repo_url: redis-latest
        - name: mysql
          type: middleware_service
          config:
            service_env:
              image: dev/dev/mysql        
            deploy:
              repo_url: mysql-latest

