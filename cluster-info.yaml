  region: "us-east-1"
  node_pools:
    - nodegroup-2
    - nodegroup-1
  kubeconfig_secret: aws-kubeconfig
  slack_channel: jenkins
  add_ons:
    - name: vpc-cni
      namespace: kube-system
      version: v1.19.4-eksbuild.1
    - name: coredns
      namespace: kube-system
      version: v1.11.4-eksbuild.2
    - name: kube-proxy
      namespace: kube-system
      version: v1.31.2-eksbuild.3
